<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConectaInclusao - Sala de aula acessível</title>
  <link rel="stylesheet" href="/css/base.css" />
</head>
<body>
  <main class="container" role="main">
    <header class="hero">
      <h1>ConectaInclusao</h1>
      <p class="subtitle">Sala de aula virtual acessível para todos.</p>
    </header>

    <section class="roles" aria-label="Escolha seu perfil">
      <h2>Como você vai entrar?</h2>
      <div class="roles__grid">
        <a class="role-btn role-btn--professor"
           href="/professor.html"
           aria-label="Entrar como Professor">
          Sou Professor
        </a>

        <a class="role-btn role-btn--surdo"
           href="/aluno-surdo.html"
           aria-label="Entrar como Aluno Surdo">
          Sou Aluno Surdo
        </a>

        <a class="role-btn role-btn--cego"
           href="/aluno-cego.html"
           aria-label="Entrar como Aluno Cego">
          Sou Aluno Cego
        </a>
      </div>
    </section>

    <footer class="footer">
      <a class="health-link" href="/health">Verificar status do servidor</a>
    </footer>
  </main>
</body>
</html>
